apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-agent-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HaPhanBaoMinh/ai-agent.git
    targetRevision: main
    path: clusters/argo/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
