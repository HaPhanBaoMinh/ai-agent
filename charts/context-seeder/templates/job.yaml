{{- if .Values.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "context-seeder.fullname" . }}
  labels:
    {{- include "context-seeder.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: {{ .Values.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "context-seeder.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: context-seeder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: QDRANT_URL
              value: {{ .Values.qdrantUrl | quote }}
            - name: COLLECTION_NAME
              value: {{ .Values.collectionName | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.embeddingModel | quote }}
            - name: VECTOR_SIZE
              value: {{ .Values.vectorSize | quote }}
            - name: DISTANCE
              value: {{ .Values.distance | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
